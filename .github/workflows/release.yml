# Publishes an OpenCompanion release when a v* tag is pushed. Each OS leg builds the self-contained
# standalone daemon (a vendored Node runtime plus the bundled daemon) with
# `pnpm --filter opencompanion standalone`, signs the macOS binaries when Apple Developer ID secrets
# are present, and tars the payload into opencompanion-<os>-<arch>.tar.gz. The publish leg gathers every
# tarball, writes SHA256SUMS and a bare VERSION marker (the tag without its leading v, which the
# updater's cheap remote check reads), attaches a build-provenance attestation to every artifact, and
# uploads the tarballs, SHA256SUMS, VERSION, and the install scripts to the GitHub release. install.sh
# and install.ps1 verify a download against SHA256SUMS before installing (see docs/verify-provenance.md).
# Every action is pinned to a full commit SHA (the trailing comment records the version).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # One leg per shipped target. Each runner vendors its own native Node and the standalone
      # script names the folder opencompanion-<process.platform>-<process.arch>, which is exactly the
      # name install.sh / install.ps1 fetch, so the runner choice fixes the artifact name.
      matrix:
        include:
          - os: ubuntu-latest
            artifact: opencompanion-linux-x64
          - os: ubuntu-24.04-arm
            artifact: opencompanion-linux-arm64
          - os: macos-15-intel
            artifact: opencompanion-darwin-x64
          - os: macos-14
            artifact: opencompanion-darwin-arm64
          - os: windows-latest
            artifact: opencompanion-win32-x64
          - os: windows-11-arm
            artifact: opencompanion-win32-arm64
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build the standalone daemon
        run: pnpm --filter opencompanion standalone

      # macOS binaries are code-signed with a Developer ID Application certificate when the signing
      # secrets are present, so Gatekeeper accepts the vendored Node runtime. Forks and any CI
      # without the secrets still produce a working unsigned tarball: the step no-ops. The vendored
      # Node runs V8's JIT under the hardened runtime, so it is signed with the allow-jit,
      # allow-unsigned-executable-memory, and disable-library-validation entitlements. Without them a
      # hardened-runtime Node would be signed but crash on launch, which is worse than unsigned.
      - name: Sign the macOS binaries
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_SIGNING_IDENTITY:-}" ]; then
            echo "No macOS signing secrets set; shipping an unsigned tarball for ${ARTIFACT}."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/opencompanion-sign.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          P12="$RUNNER_TEMP/opencompanion-cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$P12"
          security import "$P12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$P12"
          ENTITLEMENTS="$RUNNER_TEMP/opencompanion-entitlements.plist"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '<key>com.apple.security.cs.allow-jit</key><true/>' \
            '<key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>' \
            '<key>com.apple.security.cs.disable-library-validation</key><true/>' \
            '</dict></plist>' > "$ENTITLEMENTS"
          DIR="daemon/dist-standalone/${ARTIFACT}"
          # Sign every Mach-O in the payload, detected by its leading magic bytes rather than by
          # extension: the vendored Node has no extension, and node addons ship bare Mach-O helpers
          # (e.g. spawn-helper) with none either, so an extension filter would miss them. The first
          # four bytes are read with od and matched against the Mach-O magics (thin 32/64-bit either
          # endianness, plus fat/universal). Non-Mach-O files (JS, JSON, cross-platform prebuilds)
          # are skipped: codesign cannot sign them. Each match gets the hardened runtime, a secure
          # timestamp, and the JIT entitlements so the signed vendored Node still launches.
          signed=0
          while IFS= read -r -d '' f; do
            magic="$(od -An -tx1 -N4 "$f" 2>/dev/null | tr -d ' \n' || true)"
            case "$magic" in
              cffaedfe | cefaedfe | feedfacf | feedface | cafebabe)
                codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" \
                  --sign "$MACOS_SIGNING_IDENTITY" "$f"
                codesign --verify --strict "$f"
                signed=$((signed + 1))
                ;;
            esac
          done < <(find "$DIR" -type f -print0)
          if [ "$signed" -eq 0 ]; then
            echo "No Mach-O binary found under $DIR; expected at least the vendored node." >&2
            exit 1
          fi
          echo "Signed ${signed} Mach-O binaries in ${ARTIFACT}."

      # The signed payload is zipped and submitted to Apple notarization. Bare executables cannot
      # be stapled (stapler needs a bundle/dmg/pkg), but the ticket still lands: Gatekeeper resolves
      # notarization online by code-signature hash, so browser-downloaded (quarantined) copies pass
      # assessment. notarytool exits non-zero on a rejected submission, failing the leg loudly.
      # Skipped without the Apple ID secrets: forks still release, with the signing-only caveat.
      - name: Notarize the macOS binaries
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${APPLE_ID:-}" ]; then
            echo "No signing cert or no Apple ID; skipping notarization for ${ARTIFACT}."
            exit 0
          fi
          DIR="daemon/dist-standalone/${ARTIFACT}"
          ZIP="$RUNNER_TEMP/${ARTIFACT}-notarize.zip"
          ditto -c -k --keepParent "$DIR" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

      - name: Package the tarball
        shell: bash
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          DIR="daemon/dist-standalone/${ARTIFACT}"
          test -d "$DIR" || { echo "standalone folder $DIR was not produced" >&2; exit 1; }
          # Tar the folder CONTENTS (the trailing dot), not the folder, so the launcher sits at the
          # archive root: install.sh / install.ps1 extract into the install dir and expect ./opencompanion
          # (or ./opencompanion.cmd) there.
          tar -czf "${ARTIFACT}.tar.gz" -C "$DIR" .
          ls -l "${ARTIFACT}.tar.gz"

      - name: Upload the tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish the release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the release and upload assets
      id-token: write # OIDC token the attestation signs with
      attestations: write # write the build-provenance attestation
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS and VERSION
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
          # A bare version marker (the tag without its leading v) the updater's cheap remote check reads.
          printf '%s\n' "${GITHUB_REF_NAME#v}" > VERSION
          cat VERSION

      # Provenance for every uploaded artifact plus the checksum file: `gh attestation verify`
      # then proves each tarball is the unmodified output of this workflow and commit.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # install.sh / install.ps1 are served from the release so the documented
          # releases/latest/download/install.sh URL always resolves to this build's copy.
          cp install.sh install.ps1 dist/
          gh release create "$TAG" \
            --title "OpenCompanion $TAG" \
            --generate-notes \
            dist/*.tar.gz dist/SHA256SUMS dist/VERSION dist/install.sh dist/install.ps1
